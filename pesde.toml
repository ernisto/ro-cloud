name = "ernisto/ro_cloud"
version = "0.1.0-alpha.5"
description = "utilities to access roblox open cloud api"
authors = ["ernisto <joaovitordesouza707@gmail.com>"]
repository = "https://github.com/ernisto/ro-cloud"
license = "MIT"

includes = [
  "utils/**",
  "cli/**",
  "lib/**",
  "pesde.toml",
  "README.md",
  "LICENSE",
  ".luaurc",
]

[target]
environment = "lune"
lib = "lib/init.luau"
bin = "cli/init.luau"

[engines]
pesde = "^0.7.0"
lune = "^0.10.4"

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
base64 = { name = "synpixel/base64", version = "^3.0.1" }
